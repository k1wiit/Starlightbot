# Discord Bot
bot:
  token: "YOUR_BOT_TOKEN"
  guild_id: "YOUR_GUILD_ID"

# Channel IDs
channels:
  log: "CHANNEL_ID"
  ticket_log: "CHANNEL_ID"
  deleted_message_log: "CHANNEL_ID"
  whitelist: "CHANNEL_ID"
  info: "CHANNEL_ID"
  tickets: "CHANNEL_ID"
  script: "CHANNEL_ID"
  player_count_voice: "VOICE_CHANNEL_ID"
  join_to_create_voice: "CHANNEL_ID"

# Roles
roles:
  admin: "ROLE_ID"

# Admin User IDs (bypass role check)
admin_user_ids:
  - "USER_ID"

# Server Info
server:
  name: "Starlight"
  address: "play.example.com"
  version: "1.21.4"
  max_players: 30
  rules_channel_id: "CHANNEL_ID"

# Socials
socials:
  youtube: ""
  tiktok: ""
  instagram: ""
  twitch: ""
  twitter: ""
  discord_invite: ""
  website: ""

# Info Embed
info_embed:
  gif_url: "YOUR_GIF_URL"
  title: "Hello welcome to Starlight! What would you like to know?"

# Extra Info Channel Links
extra_info_channels:
  - name: "Rules"
    channel_id: "CHANNEL_ID"
  - name: "Scripts"
    channel_id: "CHANNEL_ID"
  - name: "FAQ"
    channel_id: "CHANNEL_ID"

# How to Apply Message
apply_message: "Please whitelist yourself first, then open a ticket with the category 'Application' to apply."

# Anti Spam
anti_spam:
  max_messages: 4
  time_window_seconds: 8
  timeout_minutes: 10

# Logging
logging:
  filter_patterns:
    - "Ignoring packet"
    - "moved too quickly"
    - "Can't keep up"
    - "Thread RCON Client"
    - "RCON Client"

# Player Count Voice Channel
player_count:
  update_interval_minutes: 5
  format_online: "MCOnline: %count%"
  format_offline: "MCOnline: Offline"